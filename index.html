<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripSync | Group Decision Engine</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; }
        .guide-bubble { background: #eff6ff; border: 1px solid #dbeafe; padding: 12px 16px; border-radius: 12px; font-size: 13px; color: #1e40af; line-height: 1.5; }
        .guide-bubble::before { content: '💡 Tip: '; font-weight: 800; text-transform: uppercase; font-size: 10px; display: block; margin-bottom: 2px; }
        .btn-blue { background: #2563eb; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; transition: all 0.2s; }
        .btn-blue:hover { background: #1d4ed8; transform: translateY(-1px); }
        .input-pill { border: 2px solid #f1f5f9; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .input-pill:focus { border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDuNz38PG1QkgforK3_0_7hLOLAuKZUJN0",
            authDomain: "tripsync-4a9cd.firebaseapp.com",
            projectId: "tripsync-4a9cd",
            storageBucket: "tripsync-4a9cd.firebasestorage.app",
            messagingSenderId: "867660469125",
            appId: "1:867660469125:web:0281c137eede7160b52aec",
            measurementId: "G-9YG4DYLKWC"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function TripSyncApp() {
            const [roomID, setRoomID] = useState(window.location.hash.replace('#', ''));
            const [user, setUser] = useState(localStorage.getItem('ts_user') || '');
            const [isLeader, setIsLeader] = useState(localStorage.getItem('ts_leader') === 'true');
            const [trip, setTrip] = useState(null);

            useEffect(() => {
                if (!roomID) return;
                const unsub = db.collection("rooms").doc(roomID).onSnapshot(doc => {
                    if (doc.exists) setTrip(doc.data());
                });
                return () => unsub();
            }, [roomID]);

            const updateTrip = (updates) => {
                db.collection("rooms").doc(roomID).set(updates, { merge: true });
            };

            const getScore = (destId) => {
                const dVotes = trip?.votes?.[destId] || {};
                let score = 0;
                Object.values(dVotes).forEach(metrics => {
                    Object.values(metrics).forEach(v => {
                        const val = parseInt(v);
                        if (val === 5) score += 2;
                        else if (val === 4) score += 1;
                        else if (val === 3) score += 0.5;
                        else if (val === 2) score -= 1;
                        else if (val === 1) score -= 2;
                    });
                });
                return score;
            };

            const dates = useMemo(() => {
                const r = Object.values(trip?.availability || {});
                if (r.length < (trip?.members?.length || 0)) return null;
                const start = new Date(Math.max(...r.map(x => new Date(x.start))));
                const end = new Date(Math.min(...r.map(x => new Date(x.end))));
                return { ok: start <= end, s: start.toISOString().split('T')[0], e: end.toISOString().split('T')[0] };
            }, [trip?.availability, trip?.members]);

            const winner = trip?.destinations?.length ? [...trip.destinations].sort((a,b) => getScore(b.id) - getScore(a.id))[0] : null;

            if (!roomID) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="card p-10 max-w-lg w-full">
                        <h1 className="text-4xl font-black text-blue-600 mb-2 italic tracking-tighter">TripSync</h1>
                        <p className="text-slate-500 mb-8 font-medium italic italic">MBA Decision Engine</p>
                        <div className="guide-bubble mb-8"><b>Leader:</b> Name your trip and members to start.</div>
                        <div className="space-y-4">
                            <input id="tName" placeholder="Trip Name" className="input-pill" />
                            <textarea id="mList" placeholder="Names (Alex, Jordan...)" className="input-pill h-24" />
                            <button onClick={async () => {
                                const id = Math.random().toString(36).substring(7);
                                const name = document.getElementById('tName').value;
                                const m = document.getElementById('mList').value.split(',').map(x => x.trim());
                                if(!name || m.length < 1) return alert("Fill in both fields!");
                                await db.collection("rooms").doc(id).set({ name, members: m, phase: 1, destinations: [], availability: {}, votes: {}, logistics: {hotels:[]}, logVotes: {hotels:{}} });
                                localStorage.setItem('ts_leader', 'true');
                                window.location.hash = id;
                                setRoomID(id);
                            }} className="btn-blue w-full">Initialize Room</button>
                        </div>
                    </div>
                </div>
            );

            if (!user && trip) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="card p-10 max-w-sm w-full text-center">
                        <h2 className="text-2xl font-bold mb-4 italic">Who are you?</h2>
                        <div className="space-y-2">
                            {trip.members.map(m => (
                                <button key={m} onClick={() => { setUser(m); localStorage.setItem('ts_user', m); }} className="w-full p-4 bg-slate-50 hover:bg-blue-600 hover:text-white rounded-xl font-bold transition-all">
                                    {m}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (!trip) return <div className="p-20 text-center font-bold">Connecting...</div>;

            return (
                <div className="min-h-screen pb-40">
                    <nav className="bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <h2 className="font-black text-blue-600 italic text-xl">TripSync</h2>
                        <div className="text-right">
                            <p className="text-[10px] font-bold text-slate-400">USER: {user}</p>
                            <button onClick={() => { localStorage.clear(); location.reload(); }} className="text-[10px] text-blue-500 font-bold uppercase">Switch User</button>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto mt-10 px-6">
                        {trip.phase === 1 && (
                            <div className="space-y-8">
                                <div className="guide-bubble">Enter destinations and dates.</div>
                                <div className="card p-8">
                                    <h4 className="font-bold text-lg mb-4">📍 Suggest Destinations</h4>
                                    <input placeholder="Type city and hit Enter..." className="input-pill" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value) {
                                            updateTrip({ destinations: [...(trip.destinations || []), {id: Date.now(), name: e.target.value}] });
                                            e.target.value = '';
                                        }
                                    }} />
                                    <div className="flex flex-wrap gap-2 mt-4">
                                        {trip.destinations?.map(d => <span key={d.id} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-100">{d.name}</span>)}
                                    </div>
                                </div>
                                <div className="card p-8">
                                    <h4 className="font-bold text-lg mb-4 text-center">📅 Availability</h4>
                                    <div className="flex gap-4">
                                        <input type="date" className="input-pill text-xs" onChange={e => updateTrip({ availability: {...trip.availability, [user]: {...trip.availability[user], start: e.target.value}} })} />
                                        <input type="date" className="input-pill text-xs" onChange={e => updateTrip({ availability: {...trip.availability, [user]: {...trip.availability[user], end: e.target.value}} })} />
                                    </div>
                                </div>
                            </div>
                        )}

                        {trip.phase === 2 && (
                            <div className="space-y-6">
                                <div className="guide-bubble">Vote on metrics (1-5).</div>
                                {trip.destinations?.map(d => (
                                    <div key={d.id} className="card p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <h4 className="text-2xl font-black italic">{d.name}</h4>
                                            <p className="font-mono text-2xl font-black text-blue-600">{getScore(d.id)}</p>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                            {['Fun', 'Food', 'Budget', 'Weather'].map(m => (
                                                <select key={m} className="w-full border rounded-lg p-2 text-sm font-bold bg-slate-50" value={trip.votes?.[d.id]?.[user]?.[m] || 0} onChange={e => {
                                                    const v = trip.votes || {}; if(!v[d.id]) v[d.id] = {}; if(!v[d.id][user]) v[d.id][user] = {};
                                                    v[d.id][user][m] = e.target.value; updateTrip({ votes: v });
                                                }}>
                                                    <option value="0">{m}</option>
                                                    {[5,4,3,2,1].map(n => <option key={n} value={n}>{n}</option>)}
                                                </select>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {trip.phase === 3 && (
                            <div className="space-y-6 text-center">
                                <div className="card p-10 bg-blue-600 text-white">
                                    <p className="text-[10px] font-black opacity-60 uppercase">Winner</p>
                                    <h2 className="text-5xl font-black italic">{winner?.name}</h2>
                                    <p className="text-xs mt-2">{dates?.s} to {dates?.e}</p>
                                </div>
                                <div className="card p-8 text-left">
                                    <h4 className="font-bold mb-4 italic">Suggest Lodging</h4>
                                    <input placeholder="Hotel & Price..." className="input-pill mb-4" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value) {
                                            updateTrip({ logistics: {...trip.logistics, hotels: [...(trip.logistics?.hotels || []), {id: Date.now(), val: e.target.value}]} });
                                            e.target.value = '';
                                        }
                                    }} />
                                    {trip.logistics?.hotels?.map(h => (
                                        <div key={h.id} className="flex justify-between p-4 bg-slate-50 rounded-xl mb-2 border">
                                            <span className="font-bold text-sm">{h.val}</span>
                                            <button onClick={() => updateTrip({ logVotes: {...trip.logVotes, hotels: {...trip.logVotes?.hotels, [user]: h.id}} })} className={`px-4 py-1 rounded-lg text-xs font-bold ${trip.logVotes?.hotels?.[user] === h.id ? 'bg-blue-600 text-white' : 'bg-white border text-slate-500'}`}>Vote</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {trip.phase === 4 && (
                            <div className="card text-center overflow-hidden">
                                <div className="p-12 bg-slate-900 text-white">
                                    <h2 className="text-5xl font-black italic text-blue-500 tracking-tighter">{winner?.name}</h2>
                                    <p className="font-bold text-slate-400 mt-2">Confirmed Itinerary</p>
                                </div>
                                <div className="p-10 grid grid-cols-2 gap-4 text-left">
                                    <div className="border-l-4 border-blue-500 pl-4">
                                        <p className="text-[10px] font-black text-blue-500 uppercase">Lodging</p>
                                        <p className="text-lg font-bold">{trip.logistics?.hotels?.find(h => h.id === Object.values(trip.logVotes?.hotels || {})[0])?.val || 'Pending'}</p>
                                    </div>
                                    <div className="border-l-4 border-emerald-500 pl-4">
                                        <p className="text-[10px] font-black text-blue-500 uppercase">Dates</p>
                                        <p className="text-lg font-bold">{dates?.s} — {dates?.e}</p>
                                    </div>
                                </div>
                                <button onClick={() => window.print()} className="mb-10 text-[10px] font-black text-slate-300 hover:text-blue-600">DOWNLOAD PDF</button>
                            </div>
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-600 p-4 shadow-2xl z-50">
                        <div className="max-w-3xl mx-auto flex items-center gap-4">
                            <div className="flex-1 overflow-hidden">
                                <p className="text-[10px] font-black text-blue-500 uppercase">Room URL</p>
                                <input readOnly value={window.location.href} className="text-xs w-full font-mono text-slate-400 bg-transparent outline-none cursor-pointer" onClick={e => {e.target.select(); document.execCommand('copy'); alert('Copied!'); }} />
                            </div>
                            {isLeader && (
                                <button onClick={() => updateTrip({ phase: trip.phase + 1 })} className="bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-lg">NEXT PHASE</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripSyncApp />);
    </script>
</body>
</html>
