<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripSync | Group Decision Engine</title>
    <!-- Reliable CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .card { background: white; border-radius: 20px; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.08); border: 1px solid #f1f5f9; }
        .guide-bubble { background: #eff6ff; border: 1px solid #dbeafe; padding: 12px 16px; border-radius: 12px; font-size: 13px; color: #1e40af; line-height: 1.5; }
        .guide-bubble b { color: #1d4ed8; }
        .btn-blue { background: #2563eb; color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-blue:hover { background: #1d4ed8; transform: translateY(-1px); }
        .input-pill { border: 2px solid #f1f5f9; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        .input-pill:focus { border-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyDuNz38PG1QkgforK3_0_7hLOLAuKZUJN0",
            authDomain: "tripsync-4a9cd.firebaseapp.com",
            projectId: "tripsync-4a9cd",
            storageBucket: "tripsync-4a9cd.firebasestorage.app",
            messagingSenderId: "867660469125",
            appId: "1:867660469125:web:0281c137eede7160b52aec"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function TripSyncApp() {
            const [roomID, setRoomID] = useState(window.location.hash.replace('#', ''));
            const [user, setUser] = useState(localStorage.getItem('ts_user') || '');
            const [isLeader, setIsLeader] = useState(localStorage.getItem('ts_leader') === 'true');
            const [trip, setTrip] = useState(null);

            useEffect(() => {
                if (!roomID) return;
                const unsub = db.collection("rooms").doc(roomID).onSnapshot(doc => {
                    if (doc.exists) setTrip(doc.data());
                });
                return () => unsub();
            }, [roomID]);

            const updateTrip = (updates) => {
                db.collection("rooms").doc(roomID).set(updates, { merge: true });
            };

            const getScore = (destId) => {
                const dVotes = trip?.votes?.[destId] || {};
                let score = 0;
                Object.values(dVotes).forEach(metrics => {
                    Object.values(metrics).forEach(v => {
                        const val = parseInt(v);
                        if (val === 5) score += 2;
                        else if (val === 4) score += 1;
                        else if (val === 3) score += 0.5;
                        else if (val === 2) score -= 1;
                        else if (val === 1) score -= 2;
                    });
                });
                return score;
            };

            const dates = useMemo(() => {
                const r = Object.values(trip?.availability || {});
                if (!trip?.members || r.length < trip.members.length || r.length === 0) return null;

                const startDates = r.map(x => new Date(x.start)).filter(d => !isNaN(d.getTime()));
                const endDates = r.map(x => new Date(x.end)).filter(d => !isNaN(d.getTime()));

                if (startDates.length === 0 || endDates.length === 0) return null;

                const start = new Date(Math.max(...startDates));
                const end = new Date(Math.min(...endDates));

                if (isNaN(start.getTime()) || isNaN(end.getTime())) return null;

                return { ok: start <= end, s: start.toLocaleDateString(), e: end.toLocaleDateString() };
            }, [trip?.availability, trip?.members]);

            const winner = trip?.destinations?.length ? [...trip.destinations].sort((a,b) => getScore(b.id) - getScore(a.id))[0] : null;

            if (!roomID) return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 text-white">
                    <div className="card p-10 max-w-lg w-full text-slate-900">
                        <h1 className="text-4xl font-black text-blue-600 mb-2 italic tracking-tighter">TripSync</h1>
                        <p className="text-slate-500 mb-8 font-medium italic">MBA Group Decision Engine</p>
                        <div className="guide-bubble mb-8"><b>Trip Leader:</b> Enter your trip name and member names to initialize the shared room.</div>
                        <div className="space-y-4">
                            <input id="tName" placeholder="Trip Name (e.g. Kyoto 2024)" className="input-pill" />
                            <textarea id="mList" placeholder="Member names separated by commas" className="input-pill h-24" />
                            <button onClick={async () => {
                                const id = Math.random().toString(36).substring(7);
                                const name = document.getElementById('tName').value;
                                const m = document.getElementById('mList').value.split(',').map(x => x.trim());
                                if(!name || m.length < 1) return alert("Fill in both fields!");
                                await db.collection("rooms").doc(id).set({ name, members: m, phase: 1, destinations: [], availability: {}, votes: {}, logistics: {hotels:[]}, logVotes: {hotels:{}} });
                                localStorage.setItem('ts_leader', 'true');
                                window.location.hash = id;
                                setRoomID(id);
                            }} className="btn-blue w-full">Initialize Room</button>
                        </div>
                    </div>
                </div>
            );

            if (!user && trip) return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="card p-10 max-w-sm w-full text-center">
                        <h2 className="text-2xl font-bold mb-4 italic">Identify Yourself</h2>
                        <div className="guide-bubble mb-6 text-left">Select your name to track your inputs and votes correctly.</div>
                        <div className="space-y-2">
                            {trip.members.map(m => (
                                <button key={m} onClick={() => { setUser(m); localStorage.setItem('ts_user', m); }} className="w-full p-4 bg-slate-50 hover:bg-blue-600 hover:text-white rounded-xl font-bold transition-all shadow-sm">
                                    {m}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (!trip) return <div className="p-20 text-center font-bold">Connecting to Cloud Firestore...</div>;

            return (
                <div className="min-h-screen pb-48">
                    <nav className="bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div>
                            <h2 className="font-black text-blue-600 italic text-xl">TripSync</h2>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{trip.name}</p>
                        </div>
                        <div className="text-right flex items-center gap-4">
                            <div className="hidden sm:block">
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Current User</p>
                                <p className="text-xs font-black text-blue-600">{user} {isLeader && "(Leader)"}</p>
                            </div>
                            <button onClick={() => { localStorage.clear(); location.reload(); }} className="p-2 bg-slate-100 rounded-lg hover:bg-red-50" title="Switch User">👤</button>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto mt-10 px-6">
                        
                        {/* PHASE 1: DISCOVERY */}
                        {trip.phase === 1 && (
                            <div className="space-y-8">
                                <div className="guide-bubble"><b>Phase 1: Discovery.</b> Everyone should suggest destinations and enter their travel windows. We'll track submissions in real-time.</div>
                                <div className="card p-8">
                                    <h4 className="font-bold text-lg mb-4 flex items-center gap-2">📍 Suggested Cities</h4>
                                    <input placeholder="Add a city and press Enter..." className="input-pill" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value) {
                                            updateTrip({ destinations: [...(trip.destinations || []), {id: Date.now(), name: e.target.value}] });
                                            e.target.value = '';
                                        }
                                    }} />
                                    <div className="flex flex-wrap gap-2 mt-4">
                                        {trip.destinations?.map(d => <span key={d.id} className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-100 italic">📍 {d.name}</span>)}
                                    </div>
                                </div>
                                <div className="card p-8">
                                    <h4 className="font-bold text-lg mb-4 text-center">📅 Your Availability</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="date" className="input-pill text-xs" value={trip.availability[user]?.start || ''} onChange={e => updateTrip({ availability: {...trip.availability, [user]: {...trip.availability[user], start: e.target.value}} })} />
                                        <input type="date" className="input-pill text-xs" value={trip.availability[user]?.end || ''} onChange={e => updateTrip({ availability: {...trip.availability, [user]: {...trip.availability[user], end: e.target.value}} })} />
                                    </div>
                                    <div className="mt-8 border-t pt-6">
                                        <p className="text-[10px] font-black text-slate-300 uppercase mb-3">Submission Tracker</p>
                                        <div className="grid grid-cols-2 gap-2">
                                            {trip.members.map(m => (
                                                <div key={m} className={`flex justify-between items-center p-2 rounded-lg text-xs font-bold ${trip.availability[m] ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-50 text-slate-400'}`}>
                                                    <span>{m}</span>
                                                    <span>{trip.availability[m] ? "✅ Done" : "⏳ Pending"}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PHASE 2: DECISION MATRIX */}
                        {trip.phase === 2 && (
                            <div className="space-y-6">
                                <div className="guide-bubble"><b>Phase 2: Voting.</b> Rate destinations 1-5. <br/><b>Scoring logic:</b> Extremes (1 & 5) carry ±2.0 weight. Moderates (2 & 4) carry ±1.0. Neutral (3) carries +0.5.</div>
                                {trip.destinations?.map(d => (
                                    <div key={d.id} className="card p-6 border-l-8 border-blue-600">
                                        <div className="flex justify-between items-center mb-6">
                                            <h4 className="text-2xl font-black italic">{d.name}</h4>
                                            <div className="text-right">
                                                <p className="text-[10px] font-bold text-slate-400">SCORE</p>
                                                <p className="font-mono text-2xl font-black text-blue-600 leading-none">{getScore(d.id)}</p>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                            {['Fun', 'Food', 'Cost', 'Weather'].map(m => (
                                                <div key={m}>
                                                    <label className="text-[10px] font-black text-slate-400 uppercase">{m}</label>
                                                    <select className="w-full border rounded-lg p-2 text-sm font-bold bg-slate-50 mt-1" value={trip.votes?.[d.id]?.[user]?.[m] || 0} onChange={e => {
                                                        const v = trip.votes || {}; if(!v[d.id]) v[d.id] = {}; if(!v[d.id][user]) v[d.id][user] = {};
                                                        v[d.id][user][m] = e.target.value; updateTrip({ votes: v });
                                                    }}>
                                                        <option value="0">-</option>
                                                        {[5,4,3,2,1].map(n => <option key={n} value={n}>{n}</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* PHASE 3: LOGISTICS */}
                        {trip.phase === 3 && (
                            <div className="space-y-6">
                                <div className="guide-bubble"><b>Phase 3: Logistics.</b> Kyoto won! Add lodging options below for the group to vote on.</div>
                                <div className="card p-10 bg-blue-600 text-white text-center shadow-xl shadow-blue-200">
                                    <p className="text-[10px] font-black opacity-60 uppercase tracking-widest">Winning Selection</p>
                                    <h2 className="text-5xl font-black italic my-2">{winner?.name}</h2>
                                    <div className="inline-block bg-white/20 backdrop-blur px-4 py-1 rounded-full text-xs font-bold">
                                        {dates?.ok ? `Overlapping Window: ${dates.s} - ${dates.e}` : "⚠️ Partial Conflict: Choose best overlapping dates"}
                                    </div>
                                </div>
                                <div className="card p-8">
                                    <h4 className="font-bold mb-4">🏠 Proposed Lodging</h4>
                                    <input placeholder="Add hotel name and press Enter..." className="input-pill mb-4" onKeyDown={e => {
                                        if(e.key === 'Enter' && e.target.value) {
                                            updateTrip({ logistics: {...trip.logistics, hotels: [...(trip.logistics?.hotels || []), {id: Date.now(), val: e.target.value}]} });
                                            e.target.value = '';
                                        }
                                    }} />
                                    <div className="space-y-2">
                                        {trip.logistics?.hotels?.map(h => (
                                            <div key={h.id} className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-transparent hover:border-blue-100 transition-all">
                                                <span className="font-bold text-sm">{h.val}</span>
                                                <button onClick={() => updateTrip({ logVotes: {...trip.logVotes, hotels: {...trip.logVotes?.hotels, [user]: h.id}} })} className={`px-4 py-2 rounded-lg text-xs font-bold ${trip.logVotes?.hotels?.[user] === h.id ? 'bg-blue-600 text-white' : 'bg-white border text-slate-500'}`}>
                                                    {trip.logVotes?.hotels?.[user] === h.id ? 'Voted' : 'Vote'}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* PHASE 4: FINAL */}
                        {trip.phase === 4 && (
                            <div className="card overflow-hidden text-center shadow-2xl">
                                <div className="p-12 bg-slate-900 text-white">
                                    <h2 className="text-6xl font-black italic text-blue-500 tracking-tighter mb-2">{winner?.name}</h2>
                                    <p className="font-bold text-slate-400 uppercase text-xs tracking-widest">Final Itinerary Prepared for {trip.name}</p>
                                </div>
                                <div className="p-10 grid md:grid-cols-2 gap-8 text-left">
                                    <div className="p-6 bg-slate-50 rounded-2xl border flex flex-col justify-center">
                                        <p className="text-[10px] font-black text-blue-500 uppercase mb-2 tracking-widest">Lodging</p>
                                        <p className="text-xl font-bold">{trip.logistics?.hotels?.find(h => h.id === Object.values(trip.logVotes?.hotels || {})[0])?.val || 'To be finalized'}</p>
                                    </div>
                                    <div className="p-6 bg-slate-50 rounded-2xl border flex flex-col justify-center">
                                        <p className="text-[10px] font-black text-blue-500 uppercase mb-2 tracking-widest">Confirmed Dates</p>
                                        <p className="text-xl font-bold">{dates?.s} — {dates?.e}</p>
                                    </div>
                                </div>
                                <div className="p-6 bg-white border-t flex justify-center flex-wrap gap-2">
                                    {trip.members.map(m => <span key={m} className="bg-slate-900 text-white px-3 py-1 rounded-lg text-[10px] font-black">👤 {m}</span>)}
                                </div>
                                <button onClick={() => window.print()} className="mb-10 mt-4 text-[10px] font-black text-slate-300 hover:text-blue-600 transition-colors uppercase tracking-widest">Download PDF Summary</button>
                            </div>
                        )}
                    </main>

                    {/* COMMAND CENTER (Fixed Footer) */}
                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-blue-600 p-4 shadow-2xl z-50">
                        <div className="max-w-3xl mx-auto flex flex-col md:flex-row items-center gap-6">
                            <div className="flex-1 overflow-hidden">
                                <p className="text-[10px] font-black text-blue-500 uppercase">Share this Room Link</p>
                                <input readOnly value={window.location.href} className="text-xs w-full font-mono text-slate-500 bg-transparent outline-none cursor-pointer mt-1" onClick={e => {e.target.select(); document.execCommand('copy'); alert('Room link copied to clipboard!'); }} />
                            </div>
                            {isLeader ? (
                                <div className="bg-emerald-50 border border-emerald-100 p-3 rounded-xl flex items-center gap-4">
                                    <p className="text-[11px] text-emerald-800 font-medium"><b>Leader Tip:</b> Advanced to the next phase only after everyone has submitted.</p>
                                    <button onClick={() => updateTrip({ phase: trip.phase + 1 })} className="bg-emerald-600 text-white px-5 py-2 rounded-lg font-bold text-xs whitespace-nowrap shadow-lg">NEXT PHASE →</button>
                                </div>
                            ) : (
                                <div className="bg-blue-50 border border-blue-100 p-3 rounded-xl">
                                    <p className="text-[11px] text-blue-800 italic font-medium">Logged in as Member. Please wait for your Leader to advance the phase.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripSyncApp />);
    </script>
</body>
</html>
